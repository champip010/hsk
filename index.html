<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P6 Chinese Explorer 🇸🇬</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🇸🇬 P6 Chinese Explorer</h1>
        <p>Master your vocabulary for school!</p>
    </header>

    <div class="nav-buttons">
        <button id="btn-learn" class="btn-active" onclick="switchMode('learn')">📚 Learn</button>
        <button id="btn-quiz" onclick="switchMode('quiz')">🎮 Quiz</button>
        <button id="btn-manage" onclick="switchMode('manage')">⚙️ Manage</button>
        <a href="about/" style="text-decoration: none;"><button>🙋 About</button></a>
    </div>

    <div class="filter-container">
        <label for="hsk-filter"><strong>HSK Level:</strong></label>
        <select id="hsk-filter" onchange="applyFilter()">
            <option value="All">All Words</option>
            <option value="1">HSK 1</option>
            <option value="2">HSK 2</option>
            <option value="3">HSK 3</option>
            <option value="4">HSK 4</option>
            <option value="5">HSK 5</option>
            <option value="5">HSK 6</option>
            <option value="79">HSK 7-9</option>
        </select>
        <input type="text" id="search-filter" placeholder="🔍 Search Chinese, Pinyin, or English..."
            oninput="applyFilter()">
        <button class="shuffle-btn" onclick="randomizeVocab()" title="Shuffle Order">🔀</button>
    </div>

    <div id="app-container">

        <!-- Flashcard Section -->
        <div id="learn-section">
            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="flipCard()">
                    <div class="card-face card-front">
                        <h2 class="chinese-char" id="fc-zh">学校</h2>
                        <p class="pinyin" id="fc-py">xuéxiào</p>
                        <p style="font-size: 0.9rem; color: #aaa; position: absolute; bottom: 15px;">Click to flip</p>
                    </div>
                    <div class="card-face card-back">
                        <h2 class="english" id="fc-en">School</h2>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn-action" onclick="prevCard()">⬅️ Prev</button>
                <button class="btn-audio" onclick="playAudio()" title="Listen">🔊</button>
                <button class="btn-action" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <!-- Quiz Section -->
        <div id="quiz-section">
            <h2 class="question">What is the meaning of <br><span id="quiz-zh"
                    style="color: var(--primary); font-size: 3rem;"></span> ?</h2>
            <div class="options-grid" id="options-grid"></div>
            <div id="score-display">Score: <span id="score-val">0</span></div>
            <button class="btn-action" style="margin-top: 2rem; display: none;" id="next-quiz-btn"
                onclick="loadQuiz()">Next Question ➡️</button>
        </div>

        <!-- Manage Section -->
        <div id="manage-section">
            <h2 style="margin-top: 0;">Manage Vocabulary</h2>

            <div id="msg-box"
                style="display:none; padding: 10px; margin-bottom: 10px; border-radius: 5px; color: white; font-weight: bold; text-align: center;">
            </div>

            <div class="manage-controls">
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <label class="file-upload-btn" title="Add new words. Skips duplicates.">
                        📥 Merge Excel
                        <input type="file" accept=".xlsx, .xls, .csv" onchange="importExcel(event, 'merge')">
                    </label>
                    <label class="file-upload-btn" style="background-color: #e67e22;"
                        title="Update the selected Excel file with your web words.">
                        🔄 Sync to Excel
                        <input type="file" accept=".xlsx, .xls, .csv" onchange="importExcel(event, 'sync-to-excel')">
                    </label>
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="export-btn" onclick="exportExcel()">💾 Export Excel</button>
                    <button id="delete-all-btn" class="del-btn" style="padding: 8px 15px; font-size: 0.9rem;"
                        onclick="deleteAllVocab()">🗑️ Delete All (Web)</button>
                </div>
            </div>
            <p style="font-size: 0.8rem; color: #7f8c8d; margin-top: -10px;">Excel columns required:
                <strong>Chinese</strong> and <strong>English</strong>. (Optional: Pinyin, HSK).
            </p>

            <div class="add-form">
                <input type="text" id="new-zh" placeholder="Chinese (e.g. 读书)">
                <input type="text" id="new-py" placeholder="Pinyin (dúshū)">
                <input type="text" id="new-en" placeholder="English (Read)">
                <select id="new-hsk">
                    <option value="1">HSK 1</option>
                    <option value="2">HSK 2</option>
                    <option value="3">HSK 3</option>
                    <option value="4">HSK 4</option>
                    <option value="5">HSK 5</option>
                    <option value="5">HSK 6</option>
                    <option value="79">HSK 7-9</option>
                </select>
                <button class="add-btn" onclick="addVocab()">Add</button>
            </div>

            <div style="max-height: 400px; overflow-y: auto;">
                <table id="vocab-table">
                    <thead>
                        <tr>
                            <th>Chinese</th>
                            <th>Pinyin</th>
                            <th>English</th>
                            <th>HSK</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="vocab-tbody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
